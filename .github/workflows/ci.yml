name: CI - Build y Tests

on:
  pull_request:
    branches: [develop, qa, master]
  push:
    branches: [develop, qa, master]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test **/*/Test/*.csproj --configuration Release --logger trx --collect:"XPlat Code Coverage"
